<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamran Mokhtar — Links</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0E1013;
    --surface: #16191E;
    --surface-hover: #1D2129;
    --border: #2A2F38;
    --text: #F1EFEA;
    --muted: #868C96;
    --amber: #E7A94C;
    --teal: #5FD3C4;
    --grid-dot: rgba(241,239,234,0.06);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-weight: 400;
  }

  body{
    background-image:
      radial-gradient(var(--grid-dot) 1px, transparent 1px);
    background-size: 22px 22px;
    background-position: -5px -5px;
    display: flex;
    justify-content: center;
    padding: 64px 20px 40px;
  }

  .page{
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ---- avatar ---- */
  .avatar-wrap{
    position: relative;
    width: 108px;
    height: 108px;
    margin-bottom: 22px;
  }

  .avatar{
    width: 108px;
    height: 108px;
    border-radius: 30px;
    object-fit: cover;
    border: 1px solid var(--border);
    background: var(--surface);
    display: block;
  }

  .status-tick{
    position: absolute;
    bottom: -6px;
    right: -10px;
    width: 30px;
    height: 18px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .status-tick::after{
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 8px var(--teal);
  }

  /* ---- identity ---- */
  .name{
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin: 0 0 6px;
    text-align: center;
  }

  .handle{
    font-size: 13px;
    color: var(--amber);
    margin: 0 0 12px;
    letter-spacing: 0.5px;
  }

  .tagline{
    font-size: 12.5px;
    color: var(--muted);
    text-align: center;
    line-height: 1.7;
    margin: 0 0 36px;
    max-width: 300px;
  }

  .tagline .bracket{ color: var(--teal); }

  /* ---- link list ---- */
  .links{
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-card{
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 16px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
  }

  .link-card:hover,
  .link-card:focus-visible{
    background: var(--surface-hover);
    border-color: var(--accent-color, var(--amber));
    transform: translateY(-1px);
  }

  .link-card:focus-visible{
    outline: 2px solid var(--accent-color, var(--amber));
    outline-offset: 2px;
  }

  .link-icon{
    flex: none;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    border: 1px solid var(--border);
  }

  .link-icon svg{
    width: 18px;
    height: 18px;
    stroke: var(--accent-color, var(--amber));
    fill: none;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .link-body{
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
    min-width: 0;
  }

  .link-title{
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .link-sub{
    font-size: 11.5px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .link-prompt{
    flex: none;
    font-size: 13px;
    color: var(--muted);
  }

  .link-card[data-key="instagram"]{ --accent-color: #E27D8F; }
  .link-card[data-key="x"]{ --accent-color: #EDEDED; }
  .link-card[data-key="kofi"]{ --accent-color: var(--teal); }

  /* ---- footer ---- */
  /* ---- shop marquee ---- */
  .shop-section{
    width: 100%;
    max-width: 420px;
    margin-top: 44px;
  }

  .shop-label{
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .shop-label::after{
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .marquee{
    position: relative;
    width: 100vw;
    left: 50%;
    transform: translateX(-50%);
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-x;
    cursor: grab;
    scrollbar-width: none;
    -ms-overflow-style: none;
    -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 40px, #000 calc(100% - 40px), transparent 100%);
    mask-image: linear-gradient(90deg, transparent 0, #000 40px, #000 calc(100% - 40px), transparent 100%);
  }

  .marquee::-webkit-scrollbar{
    display: none;
  }

  .marquee.dragging{
    cursor: grabbing;
    scroll-behavior: auto;
  }

  .marquee-track{
    display: flex;
    gap: 14px;
    width: max-content;
    padding: 2px 40px 10px;
  }

  .shop-card{
    flex: none;
    width: 168px;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }

  .shop-card:hover,
  .shop-card:focus-visible{
    border-color: var(--teal);
    transform: translateY(-2px);
  }

  .shop-card:focus-visible{
    outline: 2px solid var(--teal);
    outline-offset: 2px;
  }

  .shop-thumb{
    width: 100%;
    height: 112px;
    object-fit: cover;
    display: block;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  .shop-info{
    padding: 10px 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .shop-name{
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .shop-tag{
    font-size: 10.5px;
    color: var(--muted);
    line-height: 1.4;
  }

  .shop-sold{
    font-size: 10px;
    color: var(--amber);
    margin-top: 2px;
  }

  @media (prefers-reduced-motion: reduce){
    .marquee{ scroll-behavior: auto; }
  }

  .footer{
    margin-top: 44px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 0.5px;
  }

  .footer .dash{
    width: 18px;
    height: 1px;
    background: var(--border);
  }

  @media (max-width: 380px){
    .page{ max-width: 100%; }
  }

  @media (prefers-reduced-motion: reduce){
    .link-card{ transition: none; }
  }
</style>
</head>
<body>
  <div class="page">

    </nav>

    <section class="shop-section" aria-label="Shop items">
      <div class="shop-label">from the shop</div>
      <div class="marquee">
        <div class="marquee-track" id="shop-track">
          <!-- items injected by JS below, duplicated once for seamless infinite loop -->
        </div>
      </div>
    </section>

    <div class="footer">
      <span class="dash"></span>
      <span>grid: 22px</span>
      <span class="dash"></span>
    </div>

  </div>

  <script>
    const shopItems = [

      },
      {

        tag: "4 weather widgets",
        sold: "14 sold",
        url: "https://ko-fi.com/s/232c12fc68",
        img: "https://storage.ko-fi.com/cdn/useruploads/display/a4e2dfc5-682a-4cbf-916f-dbaaec40fa0f_img_7378.png"
      },
      {
        name: "BLVCK",
        tag: "6 widgets, auto-update",
        sold: "27 sold",
        url: "https://ko-fi.com/s/efa8a40e8b",
        img: "https://storage.ko-fi.com/cdn/useruploads/display/794a5ceb-3f38-41d0-ad09-307853c19e3f_blvck.png"
      }
    ];

    function cardHTML(item, hidden){
      return `
        <a class="shop-card" href="${item.url}" target="_blank" rel="noopener noreferrer"${hidden ? ' aria-hidden="true" tabindex="-1"' : ''}>
          <img class="shop-thumb" src="${item.img}" alt="${hidden ? '' : item.name + ' preview'}" loading="lazy">
          <span class="shop-info">
            <span class="shop-name">${item.name}</span>
            <span class="shop-tag">${item.tag}</span>
            <span class="shop-sold">${item.sold}</span>
          </span>
        </a>`;
    }

    const track = document.getElementById('shop-track');
    const marquee = document.querySelector('.marquee');

    if(track && marquee){
      // Render three copies so the user can drag/scroll backward or forward
      // and the loop always has content on both sides to wrap into.
      const real = shopItems.map(item => cardHTML(item, false)).join('');
      const ghost = shopItems.map(item => cardHTML(item, true)).join('');
      track.innerHTML = ghost + real + ghost;

      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      let setWidth = 0;
      let autoScroll = !prefersReducedMotion;
      let resumeTimer = null;
      let isDragging = false;
      let dragStartX = 0;
      let dragStartScroll = 0;
      let rafId = null;
      const speed = 0.5; // px per frame

      function measure(){
        setWidth = track.scrollWidth / 3;
      }

      function wrapIfNeeded(){
        if(setWidth <= 0) return;
        if(marquee.scrollLeft >= setWidth * 2){
          marquee.scrollLeft -= setWidth;
        } else if(marquee.scrollLeft <= 0){
          marquee.scrollLeft += setWidth;
        }
      }

      function pauseAuto(){
        autoScroll = false;
        if(resumeTimer) clearTimeout(resumeTimer);
      }

      function scheduleResume(delay){
        if(resumeTimer) clearTimeout(resumeTimer);
        if(prefersReducedMotion) return;
        resumeTimer = setTimeout(() => { autoScroll = true; }, delay || 2000);
      }

      function tick(){
        if(autoScroll && !isDragging){
          marquee.scrollLeft += speed;
          wrapIfNeeded();
        }
        rafId = requestAnimationFrame(tick);
      }

      // Mouse drag support (touch scrolling works natively via overflow-x)
      marquee.addEventListener('mousedown', (e) => {
        isDragging = true;
        marquee.classList.add('dragging');
        dragStartX = e.pageX;
        dragStartScroll = marquee.scrollLeft;
        pauseAuto();
      });

      window.addEventListener('mousemove', (e) => {
        if(!isDragging) return;
        e.preventDefault();
        const delta = e.pageX - dragStartX;
        marquee.scrollLeft = dragStartScroll - delta;
      });

      window.addEventListener('mouseup', () => {
        if(!isDragging) return;
        isDragging = false;
        marquee.classList.remove('dragging');
        scheduleResume(2000);
      });

      // Touch: let native scrolling happen, just pause/resume around it
      marquee.addEventListener('touchstart', pauseAuto, { passive: true });
      marquee.addEventListener('touchend', () => scheduleResume(2000), { passive: true });

      // Wheel: allow vertical wheel to scroll the strip horizontally
      marquee.addEventListener('wheel', (e) => {
        if(Math.abs(e.deltaY) > Math.abs(e.deltaX)){
          e.preventDefault();
          marquee.scrollLeft += e.deltaY;
        }
        pauseAuto();
        scheduleResume(2000);
      }, { passive: false });

      marquee.addEventListener('scroll', wrapIfNeeded, { passive: true });

      window.addEventListener('resize', measure);

      // Wait a frame so layout (fixed-width cards) is settled, then center on the real set
      requestAnimationFrame(() => {
        measure();
        marquee.scrollLeft = setWidth;
        rafId = requestAnimationFrame(tick);
      });
    }
  </script>
